name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  CARGO_NET_RETRY: "10"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-05-16
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Fetch dependencies (with retry)
        uses: ./.github/actions/cargo-fetch-retry

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      # yamllint catches structural issues in the workflow YAML before the
      # rest of the lint job spends time on cargo. ubuntu-24.04 runners ship
      # yamllint via apt; no pip install required.
      - name: yamllint workflows
        run: yamllint .github/workflows/ .github/actions/

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      # Catch broken rustdoc intra-doc links before they reach a release.
      # The crate has no library target (docs.rs is not used — see 0.3.1
      # release notes), but `cargo doc` still builds documentation for the
      # binary's modules, so this step is what guards inline rustdoc
      # quality. `--no-deps` skips dependency docs to keep the job fast.
      - name: cargo doc (deny rustdoc warnings)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --all-features

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-05-16

      - name: Install GNU tar on macOS
        # tests/release_packaging.rs invokes scripts/package-archive.sh
        # which uses GNU-tar flags. macOS' default `tar` is BSD tar; the
        # script prefers `gtar` when present, which Homebrew's `gnu-tar`
        # provides.
        if: runner.os == 'macOS'
        run: brew install gnu-tar

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Fetch dependencies (with retry)
        uses: ./.github/actions/cargo-fetch-retry

      - name: cargo build
        run: cargo build --verbose

      - name: cargo test
        run: cargo test --all-features --verbose

  msrv:
    # Pin the minimum supported Rust version declared in Cargo.toml. Cargo
    # honours `rust-version` only as a soft check; CI on stable can mask a
    # regression that prevents users on the declared MSRV from compiling.
    # Build (not test) is enough -- we just need the compiler to accept the code.
    name: MSRV build (1.85)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Rust 1.85 toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-05-16
        with:
          toolchain: "1.85"

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Fetch dependencies (with retry)
        uses: ./.github/actions/cargo-fetch-retry

      - name: cargo build --locked
        run: cargo build --locked --verbose

  audit:
    name: cargo audit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-05-16
        with:
          toolchain: stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      # cargo audit runs directly instead of rustsec/audit-check. The action
      # creates GitHub check-runs, which needs a write-capable GITHUB_TOKEN;
      # on dependabot events the token is read-only, so the action failed with
      # "Resource not accessible by integration" regardless of the audit
      # result. Running the CLI needs no check-run permissions and fails only
      # on real advisories.
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit
