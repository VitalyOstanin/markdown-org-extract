name: Dependencies

on:
  schedule:
    # Weekly, Monday 06:00 UTC. Outdated checks aren't latency-sensitive;
    # the schedule keeps signal out of the per-PR CI path.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: outdated-${{ github.ref }}
  cancel-in-progress: false

jobs:
  outdated:
    name: cargo outdated (non-blocking)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # Informational. Failures here must not block merges.
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-05-16

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-outdated
        run: cargo install --locked cargo-outdated

      - name: cargo outdated --root-deps-only
        # `--root-deps-only` keeps the report focused on dependencies declared
        # in Cargo.toml; transitive churn is noisy and rarely actionable here.
        run: cargo outdated --root-deps-only --exit-code 0
