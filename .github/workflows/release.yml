name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.1.7). Must already exist on the repository.'
        required: true
        type: string
      dry_run:
        description: 'If true, skip the final cargo publish step.'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-05-16
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1

      - name: Verify tag matches Cargo.toml version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_VERSION="${{ inputs.tag }}"
            TAG_VERSION="${TAG_VERSION#v}"
          else
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          CARGO_VERSION=$(awk -F'"' '/^version = / {print $2; exit}' Cargo.toml)
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --all-features

      - name: cargo package --list
        run: cargo package --list

      - name: cargo publish --dry-run
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --dry-run

      - name: cargo publish
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

      - name: Extract release notes from CHANGELOG.md
        id: notes
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VER="${TAG#v}"
          awk -v ver="$VER" '
            $0 ~ "^## \\["ver"\\]" { flag=1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md | sed -e '1{/^$/d}' -e '$,${/^$/d}' > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::warning::No CHANGELOG.md entry found for $VER; falling back to a placeholder note."
            echo "_See git history._" > release-notes.md
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.notes.outputs.tag }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping create."
            exit 0
          fi
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --notes-file release-notes.md \
            --verify-tag
