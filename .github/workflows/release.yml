name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.1.7). Must already exist on the repository.'
        required: true
        type: string
      dry_run:
        description: 'If true, skip the final cargo publish step.'
        required: false
        type: boolean
        default: false

# Default to least-privilege: only the publish job needs write access to
# the repo (for `gh release create`). Per-job permissions below tighten
# this further or grant the extra scope where actually required.
permissions:
  contents: read

env:
  CARGO_NET_RETRY: "10"

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  # Same matrix the CI workflow uses on every master push. Repeated here
  # because release.yml is triggered by tag push, not by branch push, so
  # CI's success on the tagged commit is not authoritative for this
  # workflow. Publication is gated on `needs: [test, lint, msrv]` below;
  # any failing pre-publish job aborts cargo publish before it can ship a
  # broken release.
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    # Inherits `contents: read` from the workflow default. Spelled out here
    # so a future refactor that flips the default to `write` does not
    # silently elevate this job.
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-05-16

      - name: Install GNU tar on macOS
        # tests/release_packaging.rs invokes scripts/package-archive.sh which
        # uses GNU-tar flags (--sort, --owner, --group, --numeric-owner,
        # --mtime). macOS' default `tar` is BSD tar and rejects these. The
        # script prefers `gtar` when present, which is what `gnu-tar`
        # provides on Homebrew.
        if: runner.os == 'macOS'
        run: brew install gnu-tar

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Fetch dependencies (with retry)
        uses: ./.github/actions/cargo-fetch-retry

      - name: cargo build
        run: cargo build --verbose

      - name: cargo test
        run: cargo test --all-features --verbose

  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-05-16
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Fetch dependencies (with retry)
        uses: ./.github/actions/cargo-fetch-retry

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  msrv:
    name: MSRV build (1.85)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Rust 1.85 toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-05-16
        with:
          toolchain: "1.85"

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Fetch dependencies (with retry)
        uses: ./.github/actions/cargo-fetch-retry

      - name: cargo build --locked
        run: cargo build --locked --verbose

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: [test, lint, msrv]
    # The only job that needs to write to the repo: `gh release create` and
    # `gh release upload` require `contents: write`.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-05-16

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Fetch dependencies (with retry)
        uses: ./.github/actions/cargo-fetch-retry

      - name: Resolve tag and version
        # Single source of truth for "what are we releasing". Both push and
        # workflow_dispatch end up here; later steps read steps.tag.outputs.tag
        # (with `v` prefix, e.g. `v0.2.3`) and steps.tag.outputs.version
        # (without prefix, e.g. `0.2.3`) instead of re-deriving them.
        #
        # The workflow_dispatch input is passed through `env:` rather than
        # interpolated into the shell body so a malicious tag value cannot
        # smuggle additional commands at template-expansion time (SEC-1 in
        # the 2026-05-25 review). `release-validate-tag.sh` then enforces
        # the `vX.Y.Z[-pre+build]` format on the resolved tag regardless of
        # which trigger produced it.
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          TAG_INPUT: ${{ inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$TAG_INPUT"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          bash scripts/release-validate-tag.sh "$TAG"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches Cargo.toml and Cargo.lock versions
        env:
          TAG_VERSION: ${{ steps.tag.outputs.version }}
        run: |
          # cargo pkgid emits e.g. `path+file:///work/repo#0.2.2`. The suffix
          # after `#` is the resolved package version straight from Cargo's
          # parser, so we don't need an ad-hoc awk pattern that could match
          # a `version = "..."` line inside a [dependencies.*] block or a
          # workspace manifest before [package].
          CARGO_VERSION=$(cargo pkgid | sed -E 's/.*#//')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi
          # Cargo.lock holds the resolved version of the crate itself. If the
          # author forgot to commit a refreshed lock after bumping Cargo.toml,
          # the tag would ship with a stale lock and `--locked` later in this
          # workflow would catch it -- but with a confusing "package not found"
          # error. Fail loudly here with a precise message instead.
          LOCK_VERSION=$(awk '/^name = "markdown-org-extract"$/{getline; sub(/^version = "/, ""); sub(/"$/, ""); print; exit}' Cargo.lock)
          if [ "$LOCK_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Cargo.lock version $LOCK_VERSION does not match tag v$TAG_VERSION. Run \`cargo update -p markdown-org-extract\` and commit Cargo.lock."
            exit 1
          fi

      - name: Verify CHANGELOG is ready for publication
        # Refuses to publish if `## [<version>]` is missing or if
        # `## [Unreleased]` still carries entries that were not moved over.
        run: ./scripts/check-changelog.sh "${{ steps.tag.outputs.version }}"

      - name: Verify the annotated tag body mirrors CHANGELOG
        # ADR-0011: the tag is annotated and its body equals the CHANGELOG
        # section (subject `v<X.Y.Z>` + the `### ...` subheadings). Catches
        # the v0.5.0 regression where the default tag cleanup (`strip`)
        # silently dropped every `### ...` heading (L1 in the 2026-05-25
        # release review) before anything reaches crates.io or the Release.
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          # actions/checkout fetches the commit but not necessarily the
          # annotated tag object, so fetch it explicitly; `git cat-file -t`
          # then resolves it as a `tag`. --force keeps the step idempotent
          # when the local ref already points at the right object.
          git fetch --force origin "refs/tags/${TAG}:refs/tags/${TAG}"
          ./scripts/release-verify-tag-body.sh "$VERSION"

      - name: Release smoke test
        # Run on the LTO-enabled release profile. Catches optimizer-only bugs
        # (UB exposed by inlining, dead-code elimination collapsing a side
        # effect, etc.) that the debug-profile tests in the `test` job
        # cannot see. Uses --quiet to suppress diagnostic chatter; the exit
        # code is the signal of interest, not the output content.
        run: |
          cargo build --release --locked
          ./target/release/markdown-org-extract --version
          ./target/release/markdown-org-extract --help >/dev/null
          ./target/release/markdown-org-extract --dir examples --current-date 2025-12-05 --quiet >/dev/null

      - name: cargo package --list
        run: cargo package --list

      - name: cargo publish --dry-run
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        # --locked forbids Cargo from regenerating Cargo.lock; the published
        # version is whatever was committed at the tagged commit. Pairs with
        # the lock-version check above so a stale lock cannot reach crates.io.
        run: cargo publish --dry-run --locked

      - name: cargo publish
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

      - name: Extract release notes from CHANGELOG.md
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
        env:
          VER: ${{ steps.tag.outputs.version }}
        run: |
          awk -v ver="$VER" '
            $0 ~ "^## \\["ver"\\]" { flag=1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md | sed -e '1{/^$/d}' -e '$,${/^$/d}' > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::warning::No CHANGELOG.md entry found for $VER; falling back to a placeholder note."
            echo "_See git history._" > release-notes.md
          fi

      - name: Create GitHub Release
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping create."
            exit 0
          fi
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --notes-file release-notes.md \
            --verify-tag

  # Cross-platform prebuilt assets. Runs after `publish` so the GitHub
  # Release already exists and `gh release upload` can attach to it.
  # The matrix picks one tier-1 target per OS; expanding to e.g.
  # `x86_64-apple-darwin` or `aarch64-unknown-linux-gnu` is a copy-paste
  # of one matrix entry.
  package-binaries:
    name: Package (${{ matrix.target }})
    needs: [publish]
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    # `gh release upload` writes to the repo; only this job needs it.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # Every entry builds with `--target <triple>` so the layout is
        # consistent across native and cross-compiled rows. `macos-latest`
        # is Apple Silicon; `aarch64-apple-darwin` is the native target,
        # `x86_64-apple-darwin` is a cross-compile that needs no extra
        # toolchain beyond `rustup target add`.
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: markdown-org-extract
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: markdown-org-extract
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            binary: markdown-org-extract
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: markdown-org-extract.exe
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-05-16
        with:
          targets: ${{ matrix.target }}

      - name: Install GNU tar on macOS
        # scripts/package-archive.sh uses GNU-tar flags (--sort, --owner,
        # --group, --numeric-owner, --mtime) for reproducible archives. The
        # script falls back to plain `tar` when `gtar` is absent, but BSD
        # tar rejects those flags. `gnu-tar` provides `gtar` so the script
        # produces the same byte-for-byte layout on macOS as on Linux.
        if: runner.os == 'macOS'
        run: brew install gnu-tar

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # Per-target cache key so the four matrix entries do not stomp
          # each other's target/ directory.
          key: ${{ matrix.target }}

      - name: Fetch dependencies (with retry)
        uses: ./.github/actions/cargo-fetch-retry

      - name: Resolve tag and version
        # Mirrors the "Resolve tag and version" step in the `test` job:
        # `inputs.tag` flows through `env:` (no YAML expansion into the
        # shell), then `release-validate-tag.sh` enforces the tag format
        # before any later step can consume the value. See SEC-1 in the
        # 2026-05-25 review for context.
        id: tag
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          TAG_INPUT: ${{ inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$TAG_INPUT"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          bash scripts/release-validate-tag.sh "$TAG"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      # Packaging is delegated to scripts/package-archive.sh so the same
      # logic can be exercised by Rust integration tests
      # (tests/release_packaging.rs) instead of living only inside YAML.
      # `tar` is available on every runner; `7z` is preinstalled on
      # windows-latest and is the most stable cross-shell way to produce
      # a .zip without PowerShell's CRLF / encoding gotchas.
      - name: Package archive and SHA-256
        id: pack
        shell: bash
        env:
          VER: ${{ steps.tag.outputs.version }}
          TARGET: ${{ matrix.target }}
          ARCHIVE_EXT: ${{ matrix.archive }}
          BIN_NAME: ${{ matrix.binary }}
          BIN_PATH: target/${{ matrix.target }}/release/${{ matrix.binary }}
        run: bash scripts/package-archive.sh >> "$GITHUB_OUTPUT"

      # Defends the downstream-packager contract documented in the README:
      # filename matches the template, sibling .sha256 verifies cleanly,
      # archive expands to a single top-level directory matching the
      # stem, that directory contains exactly the binary + README +
      # LICENSE. Catches regressions like the original Windows-zip layout
      # bug (flat-rooted archive) before the asset reaches the release.
      - name: Verify archive against downstream contract
        shell: bash
        env:
          ASSET: ${{ steps.pack.outputs.asset }}
          BIN_NAME: ${{ matrix.binary }}
        run: bash scripts/verify-archive.sh "$ASSET" "$BIN_NAME"

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          ASSET: ${{ steps.pack.outputs.asset }}
        shell: bash
        run: |
          # `--clobber` makes the upload idempotent: a re-run after a
          # transient network failure overwrites the partial blob instead
          # of erroring with "asset already exists".
          gh release upload "$TAG" "$ASSET" "${ASSET}.sha256" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
